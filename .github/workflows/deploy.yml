name: Deploy Backend

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: az acr login --name ${{ secrets.ACR_NAME }}

    - name: Build and push image
      run: |
        docker build -t ${{ secrets.ACR_NAME }}.azurecr.io/kwb-upload-api:latest .
        docker push ${{ secrets.ACR_NAME }}.azurecr.io/kwb-upload-api:latest

    - name: Deploy to Container Apps
      run: |
        az containerapp update \
          --name kwb-upload-api \
          --resource-group ${{ secrets.AZURE_RG }} \
          --image ${{ secrets.ACR_NAME }}.azurecr.io/kwb-upload-api:latest
